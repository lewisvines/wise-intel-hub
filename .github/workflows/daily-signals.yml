name: WiSE Daily Signal Scanner

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan-signals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic requests
      - name: Run signal scanner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python .github/scripts/scan_signals.py
      - name: Commit changes
        run: |
          git config user.name "WiSE Signal Bot"
          git config user.email "wise-bot@lewisvines.github.io"
          git add signals.json
          git diff --staged --quiet || git commit -m "chore: daily signal scan $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main
