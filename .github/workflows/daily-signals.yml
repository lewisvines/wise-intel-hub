name: WiSE Daily Signal Scanner

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan-signals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run signal scanner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python .github/scripts/scan_signals.py

      - name: Commit updated signals.json
        run: |
          git config user.name "WiSE Signal Bot"
          git config user.email "wise-bot@lewisvines.github.io"
          git add signals.json
          git diff --staged --quiet || git commit -m "chore: daily signal scan $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main
