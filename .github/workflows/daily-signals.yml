name: WiSE Daily Intelligence Feed
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-signals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: signals
      - uses: actions/checkout@v4
        with:
          ref: main
          path: main-ref
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: |
          cp -r main-ref/scripts ./scripts
          cd scripts && npm install
          cd .. && node scripts/fetch-signals.js
        timeout-minutes: 5
      - run: |
          git config user.name "WiSE Intel Bot"
          git config user.email "wise-intel@sage-wise.io"
          git add signals.json
          git diff --cached --quiet || git commit -m "Daily signals"
          git push origin signals
