name: WiSE Daily Intelligence Feed

on:
  schedule:
      - cron: '0 6 * * *'
        workflow_dispatch:

        jobs:
          update-signals:
              runs-on: ubuntu-latest
                  steps:
                        - name: Checkout signals branch
                                uses: actions/checkout@v4
                                        with:
                                                  ref: signals
                                                            token: ${{ secrets.GITHUB_TOKEN }}

                                                                  - name: Checkout scripts from main
                                                                          uses: actions/checkout@v4
                                                                                  with:
                                                                                            ref: main
                                                                                                      path: main-scripts
                                                                                                                sparse-checkout: scripts
                                                                                                                          sparse-checkout-cone-mode: false
                                                                                                                          
                                                                                                                                - name: Setup Node.js
                                                                                                                                        uses: actions/setup-node@v4
                                                                                                                                                with:
                                                                                                                                                          node-version: '20'
                                                                                                                                                          
                                                                                                                                                                - name: Install and run
                                                                                                                                                                        run: |
                                                                                                                                                                                  cp -r main-scripts/scripts ./scripts
                                                                                                                                                                                            cd scripts && npm install
                                                                                                                                                                                                      cd .. && node scripts/fetch-signals.js
                                                                                                                                                                                                      
                                                                                                                                                                                                            - name: Commit signals
                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                              git config user.name "WiSE Intel Bot"
                                                                                                                                                                                                                                        git config user.email "wise-intel@sage-wise.io"
                                                                                                                                                                                                                                                  git add signals.json
                                                                                                                                                                                                                                                            git diff --cached --quiet || git commit -m "Daily signals $(date +'%Y-%m-%d')"
                                                                                                                                                                                                                                                                      git push origin signals
