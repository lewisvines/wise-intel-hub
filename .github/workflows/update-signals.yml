name: WiSE Intel Hub — Signal Update
on:
  schedule:
    - cron: '0 6 * * 1-5'
    - cron: '0 13 * * 1-5'
  workflow_dispatch:
jobs:
  update-signals:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic requests beautifulsoup4
      - run: python scripts/update_signals.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - run: |
          git config user.name "WiSE Signal Bot"
          git config user.email "wise-bot@sage.com"
          git add dev.html
          git diff --staged --quiet || git commit -m "Auto signal update — $(date -u +'%B %d, %Y %H:%M UTC')"
          git push
